# CI de LaDistorneta: compila macOS (universal, .pkg) y Windows (VST3, .exe).
# - En cada push a main o corrida manual: deja los instaladores como artifacts.
# - Al pushear un tag v* (ej. v0.0.1): ademas crea un GitHub Release publico
#   con el .pkg y el .exe para que la gente los descargue.
name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Compilar y empaquetar (.pkg universal)
        run: ./make_pkg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: LaDistorneta-macOS
          path: '*.pkg'

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar
        run: cmake -B build

      - name: Compilar
        run: cmake --build build --config Release

      - name: Armar instalador (.exe con Inno Setup, preinstalado en el runner)
        run: iscc installer\LaDistorneta.iss

      - uses: actions/upload-artifact@v4
        with:
          name: LaDistorneta-Windows
          path: installer/Output/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Publicar release con los instaladores
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LaDistorneta-macOS/*.pkg
            LaDistorneta-Windows/*.exe
